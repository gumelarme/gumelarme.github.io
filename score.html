<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>Document</title>
        <link rel="stylesheet" href="./css/score.css" type="text/css" media="screen" />
    </head>
    <body>
        <h1>SCORE</h1>
        <div id="score-wrapper">
        </div>
        <br />
        <div id="input-wrapper">
            <input id="add-input" type="number" value="100" step="10"/>
            <input id="sub-input" type="number" value="50" step="10"/>
            <br />
            <br />
            <button id="reset-btn" onclick="resetScore()">Reset</button>
            <button id="edit-btn" onclick="btnEdit_Click()">Edit</button>
        </div>
        <div class="score-board hidden">
            <div>
                <div class="score-name">
                    <span></span>
                    <input type="text" class="hidden"/>
                </div>
                <button class="add-btn">▲</button>
                <div class="score-count">
                    <span>0</span>
                    <input type="number" value="0" step="10" class="hidden"/>
                </div>
                <button class="sub-btn">▼</button>
            </div>
        </div>
        <script type="text/javascript" src="./js/score.js"></script>
    </body>
</html>
